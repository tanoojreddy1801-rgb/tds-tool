<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  padding: 15px;
  background: #f7f9fc;
}

/* SECTION CARD */
.section {
  background: white;
  border-radius: 14px;
  margin-bottom: 15px;
  border: 1px solid #e5e7eb;
  overflow: hidden;
}

/* HEADER */
.section-header {
  padding: 15px;
  font-weight: 600;
  cursor: pointer;
  font-size: 16px;
}

.section-header:hover {
  background: #eef2ff;
}

/* CONTENT */
.section-content {
  display: none;
  padding: 15px;
}

/* ACTIVE */
.section.active .section-content {
  display: block;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
  margin-top: 10px;
  border: 1px solid #ddd;
  border-radius: 10px;
  display: none;
}

li {
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
}

li:hover {
  background: #eef2ff;
}

/* RESULT */
.result {
  margin-top: 15px;
  background: #eef2ff;
  padding: 12px;
  border-radius: 10px;
}

/* MOBILE FIX */
@media (max-width:600px){
  body {
    padding: 10px;
  }
}

</style>
</head>

<body>

<!-- 🔥 TDS TOOL -->
<div class="section active">

  <div class="section-header">TDS Compliance Check</div>

  <div class="section-content">

    <input type="text" id="search" placeholder="Search Nature of Payment...">

    <ul id="list"></ul>

    <div class="result">
      <p><b>Old Act:</b> <span id="old"></span></p>
      <p><b>New Act:</b> <span id="new"></span></p>
      <p><b>Threshold:</b> <span id="th"></span></p>
      <p><b>Rate:</b> <span id="rate"></span></p>
    </div>

  </div>
</div>

<!-- 🔥 COMING SOON -->
<div class="section">
  <div class="section-header">ITR Forms Check & Comparison</div>
  <div class="section-content">Coming Soon</div>
</div>

<div class="section">
  <div class="section-header">Other Tools</div>
  <div class="section-content">Coming Soon</div>
</div>

<script>

let data = [];

/* FETCH DATA */
fetch('data.json')
.then(res => res.json())
.then(json => {
  data = json;
});

/* RENDER LIST */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {

    const keys = Object.keys(item);

    const li = document.createElement("li");
    li.textContent = item[keys[0]];

    li.onclick = () => {

      document.getElementById("old").textContent = item[keys[1]] || "-";
      document.getElementById("new").textContent = item[keys[2]] || "-";
      document.getElementById("th").textContent = item[keys[3]] || "-";
      document.getElementById("rate").textContent = item[keys[4]] || "-";

      document.getElementById("list").style.display = "none";
      document.getElementById("search").value = "";

    };

    list.appendChild(li);
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){

  const val = this.value.toLowerCase();
  const list = document.getElementById("list");

  if(!val){
    list.style.display = "none";
    return;
  }

  list.style.display = "block";

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);
});

/* ACCORDION */
document.querySelectorAll(".section-header").forEach(header => {
  header.onclick = () => {
    header.parentElement.classList.toggle("active");
  };
});

</script>

</body>
</html>
