<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f9fc;
  margin: 0;
  padding: 15px;
}

/* BOX */
.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
  max-width: 600px;
  margin: auto;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
  margin-top: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  display: none;
}

li {
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
}

li:hover {
  background: #eef2ff;
}

/* RESULT */
.result {
  margin-top: 15px;
  background: #eef2ff;
  padding: 12px;
  border-radius: 8px;
}

#nature {
  font-weight: 600;
  color: #1a237e;
}
</style>
</head>

<body>

<div class="box">

<h3>TDS Compliance Check</h3>

<input type="text" id="search" placeholder="Click or type to search...">
<ul id="list"></ul>

<div class="result">
  <p><b>Nature of Payment:</b> <span id="nature"></span></p>
  <p><b>Old Act:</b> <span id="old"></span></p>
  <p><b>New Act:</b> <span id="new"></span></p>
  <p><b>Threshold:</b> <span id="th"></span></p>
  <p><b>Rate:</b> <span id="rate"></span></p>
</div>

</div>

<script>

let data = [];

/* 🔥 FETCH JSON */
fetch('data.json')
.then(res => res.json())
.then(json => {
  data = json;
});

/* 🔹 RENDER LIST */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {

    const keys = Object.keys(item);

    const li = document.createElement("li");
    li.textContent = item[keys[0]] || "Unknown";

    li.onclick = () => {

      document.getElementById("nature").textContent = item[keys[0]] || "-";
      document.getElementById("old").textContent = item[keys[1]] || "-";
      document.getElementById("new").textContent = item[keys[2]] || "-";
      document.getElementById("th").textContent = item[keys[3]] || "-";
      document.getElementById("rate").textContent = item[keys[4]] || "-";

      list.style.display = "none";
      document.getElementById("search").value = "";

    };

    list.appendChild(li);
  });
}

/* 🔥 SHOW LIST (MOBILE + DESKTOP SAFE) */
function showList(){
  const list = document.getElementById("list");
  list.style.display = "block";
  renderList(data);
}

const search = document.getElementById("search");

/* MULTI-EVENT SUPPORT */
search.addEventListener("focus", showList);
search.addEventListener("click", showList);
search.addEventListener("touchstart", showList);

/* 🔍 FILTER */
search.addEventListener("input", function(){

  const val = this.value.toLowerCase();
  const list = document.getElementById("list");

  list.style.display = "block";

  if(!val){
    renderList(data);
    return;
  }

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);

});

</script>

</body>
</html>
