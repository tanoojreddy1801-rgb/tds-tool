<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f4f6fb;
}

/* CARDS */
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.card {
  flex: 1 1 260px;
  max-width: 300px;
  padding: 22px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  background: linear-gradient(135deg, #1a237e, #3949ab);
  color: white;
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  width: 95%;
  max-width: 650px;
  margin: 5% auto;
  padding: 20px;
  border-radius: 12px;
}

/* SEARCH */
input {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
  margin: 10px 0;
  border: 1px solid #ddd;
  max-height: 220px;
  overflow-y: auto;
  border-radius: 8px;
}

ul {
  list-style: none;
  padding: 0;
  margin: 10px 0;
  border: 1px solid #ddd;
  max-height: 220px;
  overflow-y: auto;
  border-radius: 8px;

  display: none;   /* 🔥 THIS IS THE KEY FIX */
}
  
li {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
}

li:hover {
  background: #e8eaf6;
}

/* RESULT */
.result {
  margin-top: 15px;
  background: #eef2ff;
  padding: 12px;
  border-radius: 10px;
}

/* MOBILE */
@media (max-width:600px){
  .container {flex-direction: column;}
}
</style>
</head>

<body>

<div class="container">

  <div class="card" onclick="openModal()">
    <h3>TDS Compliance Check</h3>
    <p>Search & compare provisions</p>
  </div>

  <div class="card">
    <h3>ITR Forms</h3>
    <p>Coming Soon</p>
  </div>

  <div class="card">
    <h3>Other Tools</h3>
    <p>Coming Soon</p>
  </div>

</div>

<div id="modal" class="modal">
  <div class="modal-content">

    <span onclick="closeModal()" style="float:right;cursor:pointer;font-size:20px;">✖</span>

    <h3>TDS Checker</h3>

    <input type="text" id="search" placeholder="Search...">
    <ul id="list"></ul>

    <div class="result">
      <p><b>Old Act:</b> <span id="old"></span></p>
      <p><b>New Act:</b> <span id="new"></span></p>
      <p><b>Threshold:</b> <span id="th"></span></p>
      <p><b>Rate:</b> <span id="rate"></span></p>
    </div>

  </div>
</div>

<script>

let data = [];

/* LOAD JSON */
fetch('data.json')
.then(res => res.json())
.then(json => {
  data = json;
});

/* RENDER LIST */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {

    const keys = Object.keys(item);

    const li = document.createElement("li");

    /* FIRST COLUMN AS NAME */
    li.textContent = item[keys[0]] || "Unknown";

    li.onclick = () => {

      document.getElementById("old").textContent = item[keys[1]] || "-";
      document.getElementById("new").textContent = item[keys[2]] || "-";
      document.getElementById("th").textContent = item[keys[3]] || "-";
      document.getElementById("rate").textContent = item[keys[4]] || "-";

      /* 🔥 HIDE LIST AFTER CLICK */
      document.getElementById("list").style.display = "none";

      /* OPTIONAL: CLEAR SEARCH */
      document.getElementById("search").value = "";

    };

    list.appendChild(li);
  });
}

/* SEARCH BEHAVIOUR */
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  const list = document.getElementById("list");

  if(!val){
    list.style.display = "none";
    list.innerHTML = "";
    return;
  }

  list.style.display = "block";

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);
});

/* MODAL CONTROL */
function openModal(){
  document.getElementById("modal").style.display = "block";

  /* HIDE LIST INITIALLY */
  document.getElementById("list").style.display = "none";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

</script>
</body>
</html>
