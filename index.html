<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>

/* GLOBAL */
body {
  font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f7f9fc;
  color: #1a1a1a;
}

/* CONTAINER */
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

/* CARDS */
.card {
  flex: 1 1 260px;
  max-width: 300px;
  padding: 22px;
  border-radius: 16px;
  text-align: left;
  cursor: pointer;
  background: white;
  border: 1px solid #e5e7eb;
  transition: all 0.25s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card h3 {
  margin: 0 0 8px;
  font-size: 18px;
}

.card p {
  margin: 0;
  font-size: 14px;
  color: #6b7280;
}

.card:hover {
  transform: translateY(-4px);
  border-color: #6366f1;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* MODAL BACKDROP */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 999;
}

/* MODAL BOX */
.modal-content {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 95%;
  max-width: 700px;
  height: 85vh;
  background: white;
  border-radius: 18px 18px 0 0;
  padding: 18px;
  overflow-y: auto;
}

/* DESKTOP CENTER MODAL */
@media (min-width: 768px){
  .modal-content {
    top: 50%;
    bottom: auto;
    transform: translate(-50%, -50%);
    height: auto;
    max-height: 80vh;
    border-radius: 18px;
  }
}

/* SEARCH BOX */
input {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  outline: none;
  margin-top: 10px;
  transition: 0.2s;
}

input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
  margin: 10px 0;
  border: 1px solid #e5e7eb;
  max-height: 250px;
  overflow-y: auto;
  border-radius: 12px;
  display: none;
  background: white;
}

li {
  padding: 12px 14px;
  font-size: 14px;
  cursor: pointer;
  border-bottom: 1px solid #f1f5f9;
  transition: 0.2s;
}

li:last-child {
  border-bottom: none;
}

li:hover {
  background: #eef2ff;
}

/* RESULT BOX */
.result {
  margin-top: 15px;
  background: #f8fafc;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
}

.result p {
  margin: 6px 0;
  font-size: 14px;
}

/* CLOSE BUTTON */
.close-btn {
  float: right;
  font-size: 20px;
  cursor: pointer;
  color: #6b7280;
}

.close-btn:hover {
  color: black;
}

/* MOBILE STACK */
@media (max-width:600px){
  .container {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="card" onclick="openModal()">
    <h3>TDS Compliance Check</h3>
    <p>Search & compare provisions</p>
  </div>

  <div class="card">
    <h3>ITR Forms</h3>
    <p>Coming Soon</p>
  </div>

  <div class="card">
    <h3>Other Tools</h3>
    <p>Coming Soon</p>
  </div>

</div>

<div id="modal" class="modal">
  <div class="modal-content">

    <span onclick="closeModal()" style="float:right;font-size:20px;cursor:pointer;">✖</span>

    <h3>TDS Checker</h3>

    <input type="text" id="search" placeholder="Search...">
    <ul id="list"></ul>

    <div class="result">
      <p><b>Old Act:</b> <span id="old"></span></p>
      <p><b>New Act:</b> <span id="new"></span></p>
      <p><b>Threshold:</b> <span id="th"></span></p>
      <p><b>Rate:</b> <span id="rate"></span></p>
    </div>

  </div>
</div>

<script>

let data = [];

/* LOAD JSON */
fetch('data.json')
.then(res => res.json())
.then(json => {
  data = json;
});

/* RENDER LIST */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {

    const keys = Object.keys(item);

    const li = document.createElement("li");

    li.textContent = item[keys[0]] || "Unknown";

    li.onclick = () => {

      document.getElementById("old").textContent = item[keys[1]] || "-";
      document.getElementById("new").textContent = item[keys[2]] || "-";
      document.getElementById("th").textContent = item[keys[3]] || "-";
      document.getElementById("rate").textContent = item[keys[4]] || "-";

      document.getElementById("list").style.display = "none";
      document.getElementById("search").value = "";

    };

    list.appendChild(li);
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  const list = document.getElementById("list");

  if(!val){
    list.style.display = "none";
    list.innerHTML = "";
    return;
  }

  list.style.display = "block";

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);
});

/* MODAL CONTROL */
function openModal(){
  document.getElementById("modal").style.display = "block";
  document.body.style.overflow = "hidden";
  document.getElementById("list").style.display = "none";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.body.style.overflow = "auto";
}

</script>

</body>
</html>
