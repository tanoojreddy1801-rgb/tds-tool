<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f4f6fb;
  margin: 0;
  padding: 30px 10px;
}

/* MAIN CARD */
.box {
  max-width: 520px;
  margin: auto;
  background: #ffffff;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  border: 1px solid #e6e9f0;
}

/* TITLE */
.box h3 {
  text-align: center;
  color: #1f2a6b;
  font-size: 22px;
  margin-bottom: 20px;
}

/* LABEL */
.label {
  font-size: 15px;
  margin-bottom: 6px;
  color: #333;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  border-radius: 10px;
  border: 1px solid #dcdfe6;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #4c5bd4;
  box-shadow: 0 0 0 3px rgba(76,91,212,0.1);
}

/* DROPDOWN LIST */
ul {
  list-style: none;
  padding: 0;
  margin-top: 10px;
  border-radius: 10px;
  background: #fff;
  border: 1px solid #ddd;
  display: none;
}

li {
  padding: 12px;
  font-size: 14px;
  cursor: pointer;
  border-bottom: 1px solid #f1f1f1;
}

li:hover {
  background: #eef1ff;
}

/* RESULT CARD */
.result {
  margin-top: 18px;
  background: #eef1ff;
  padding: 18px;
  border-radius: 12px;
  border-left: 5px solid #2d3dbf;
}

/* RESULT TEXT */
.result p {
  margin: 8px 0;
  font-size: 15px;
}

/* HIGHLIGHT FIELD */
#nature {
  font-weight: 600;
  color: #1f2a6b;
}

/* MOBILE */
@media (max-width:600px){
  .box {
    padding: 18px;
  }
}

</style>
</head>

<body>

<div class="box">

<h3>TDS Compliance Check</h3>

<input type="text" id="search" placeholder="Click or type to search...">
<ul id="list"></ul>

<div class="result">
  <p><b>Nature of Payment:</b> <span id="nature"></span></p>
  <p><b>Old Act:</b> <span id="old"></span></p>
  <p><b>New Act:</b> <span id="new"></span></p>
  <p><b>Threshold:</b> <span id="th"></span></p>
  <p><b>Rate:</b> <span id="rate"></span></p>
</div>

</div>

<script>

let data = [];

/* 🔥 FETCH JSON */
fetch('data.json')
.then(res => res.json())
.then(json => {
  data = json;
});

/* 🔹 SAFE KEY FINDER (CORE FIX) */
function getVal(obj, keyword){
  const key = Object.keys(obj).find(k =>
    k.toLowerCase().replace(/\s+/g,'').includes(keyword)
  );
  return key ? obj[key] : "";
}

/* 🔹 RENDER LIST */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {

    const li = document.createElement("li");

    li.textContent = getVal(item, "nature") || "Unknown";

    li.onclick = () => {

      document.getElementById("nature").textContent = getVal(item,"nature") || "-";
      document.getElementById("old").textContent = getVal(item,"old") || "-";
      document.getElementById("new").textContent = getVal(item,"new") || "-";
      document.getElementById("th").textContent = getVal(item,"threshold") || "-";
      document.getElementById("rate").textContent = getVal(item,"rate") || "-";

      /* HIDE LIST */
      document.getElementById("list").style.display = "none";

      /* CLEAR SEARCH */
      document.getElementById("search").value = "";

    };

    list.appendChild(li);
  });
}

/* 🔥 SHOW LIST (MOBILE SAFE) */
function showList(){
  const list = document.getElementById("list");
  list.style.display = "block";
  renderList(data);
}

const search = document.getElementById("search");

/* MULTI-EVENT SUPPORT */
search.addEventListener("focus", showList);
search.addEventListener("click", showList);
search.addEventListener("touchstart", showList);

/* 🔍 FILTER */
search.addEventListener("input", function(){

  const val = this.value.toLowerCase();
  const list = document.getElementById("list");

  list.style.display = "block";

  if(!val){
    renderList(data);
    return;
  }

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);

});

</script>

</body>
</html>
