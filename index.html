<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f4f6fb;
  margin: 0;
  padding: 30px 10px;
}

/* CARD */
.box {
  max-width: 520px;
  margin: auto;
  background: #fff;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  border: 1px solid #e6e9f0;
}

/* TITLE */
.box h3 {
  text-align: center;
  color: #1f2a6b;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
  margin-top: 10px;
  border: 1px solid #ddd;
  border-radius: 10px;
  display: none;
}

li {
  padding: 12px;
  cursor: pointer;
}

li:hover {
  background: #eef1ff;
}

/* RESULT */
.result {
  margin-top: 18px;
  background: #eef1ff;
  padding: 15px;
  border-radius: 12px;
  border-left: 5px solid #2d3dbf;
}

.result p {
  margin: 8px 0;
}

</style>
</head>

<body>

<div class="box">

<h3>TDS Compliance Check</h3>

<input type="text" id="search" placeholder="Click or type to search...">
<ul id="list"></ul>

<div class="result">
  <p><b>Nature of Payment:</b> <span id="nature"></span></p>
  <p><b>Old Act (1961):</b> <span id="old"></span></p>
  <p><b>New Act (2025):</b> <span id="new"></span></p>
  <p><b>Specified Person:</b> <span id="person"></span></p>
  <p><b>Threshold:</b> <span id="th"></span></p>
  <p><b>Applicable Rate:</b> <span id="rate"></span></p>
  <p><b>Rate (Finance Act 2026):</b> <span id="rate2026"></span></p>
</div>

</div>

<script>

let data = [];

/* FETCH JSON */
fetch('https://tanoojreddy1801-rgb.github.io/tds-tool/data.json')
.then(res => res.json())
.then(json => {
  data = json;
});

/* 🔥 FIND KEY SAFELY */
function findKey(obj, text){
  return Object.keys(obj).find(k => k.toLowerCase().includes(text));
}

/* RENDER LIST */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {

    const natureKey = findKey(item, "nature");

    const li = document.createElement("li");
    li.textContent = natureKey ? item[natureKey] : "Unknown";

    li.onclick = () => {

      document.getElementById("nature").textContent =
        natureKey ? item[natureKey] : "-";

      const oldKey = findKey(item, "old");
      const newKey = findKey(item, "new");
      const personKey = findKey(item, "specified");
      const thKey = findKey(item, "threshold");
      const rateKey = findKey(item, "applicable rate");
      const rate2026Key = findKey(item, "2026");

      document.getElementById("old").textContent = oldKey ? item[oldKey] : "-";
      document.getElementById("new").textContent = newKey ? item[newKey] : "-";
      document.getElementById("person").textContent = personKey ? item[personKey] : "-";
      document.getElementById("th").textContent = thKey ? item[thKey] : "-";
      document.getElementById("rate").textContent = rateKey ? item[rateKey] : "-";
      document.getElementById("rate2026").textContent = rate2026Key ? item[rate2026Key] : "-";

      list.style.display = "none";
      document.getElementById("search").value = "";
    };

    list.appendChild(li);
  });
}

/* SHOW LIST */
function showList(){
  const list = document.getElementById("list");
  list.style.display = "block";
  renderList(data);
}

const search = document.getElementById("search");

search.addEventListener("focus", showList);
search.addEventListener("click", showList);
search.addEventListener("touchstart", showList);

/* FILTER */
search.addEventListener("input", function(){

  const val = this.value.toLowerCase();
  const list = document.getElementById("list");

  list.style.display = "block";

  if(!val){
    renderList(data);
    return;
  }

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);

});

</script>

</body>
</html>
