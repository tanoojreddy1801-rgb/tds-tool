<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
  margin: 0;
  padding: 30px 10px;
}

/* CARD */
.box {
  max-width: 520px;
  margin: auto;
  background: #fff;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* TITLE */
.box h3 {
  text-align: center;
  color: #1f2a6b;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
  margin-top: 10px;
  border: 1px solid #ddd;
  border-radius: 10px;
  display: none;
  max-height: 220px;
  overflow-y: auto;
}

li {
  padding: 12px;
  cursor: pointer;
}

li:hover {
  background: #eef1ff;
}

/* RESULT */
.result {
  margin-top: 18px;
  background: #eef1ff;
  padding: 15px;
  border-radius: 12px;
  border-left: 5px solid #2d3dbf;
}

.result p {
  margin: 8px 0;
}

/* BADGE */
.badge {
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  font-size:13px;
  margin-top:5px;
  font-weight:600;
}

.green { background:#e6f9ed; color:#0a7a33; }
.red { background:#ffe6e6; color:#b30000; }
.gray { background:#eee; color:#555; }

</style>
</head>

<body>

<div class="box">

<h3>TDS Compliance Check</h3>

<input type="text" id="search" placeholder="Search nature of payment...">
<ul id="list"></ul>

<div class="result">
  <p><b>Nature of Payment:</b> <span id="nature"></span></p>
  <p><b>Old Act (1961):</b> <span id="old"></span></p>
  <p><b>New Act (2025):</b> <span id="new"></span></p>
  <p><b>New Threshold (FY 2026-27 onwards):</b> <span id="th"></span></p>
  <p><b>Applicable rate:</b> <span id="rate"></span></p>
  <p><b>Applicable rate (if further amended by Finance Act, 2026):</b> <span id="rate2026"></span></p>
  <p><span id="rateBadge"></span></p>
</div>

</div>

<script>

let data = [];

/* FETCH JSON */
fetch('https://tanoojreddy1801-rgb.github.io/tds-tool/data.json')
.then(res => res.json())
.then(json => {
  data = json;
});

/* EXACT KEY MATCH */
function get(obj, keyName){
  return Object.keys(obj).find(k =>
    k.replace(/\n/g,'').trim() === keyName
  );
}

/* EXTRACT NUMBER FOR COMPARISON */
function extractNumber(val){
  if(!val) return 0;
  const match = val.match(/[\d.]+/);
  return match ? parseFloat(match[0]) : 0;
}

/* RENDER LIST */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {

    const natureKey = get(item, "Nature of Payment");

    const li = document.createElement("li");
    li.textContent = natureKey ? item[natureKey] : "Unknown";

    li.onclick = () => {

      const oldKey = get(item, "Old Act (1961)");
      const newKey = get(item, "New Act (2025)");
      const thKey = get(item, "New Threshold (FY 2026-27 onwards)");
      const rateKey = get(item, "Applicable rate");
      const rate2026Key = get(item, "Applicable rate (if further amended by Finance Act, 2026)");

      const rate = rateKey ? item[rateKey] : "";
      const rate2026 = rate2026Key ? item[rate2026Key] : "";

      document.getElementById("nature").textContent = natureKey ? item[natureKey] : "-";
      document.getElementById("old").textContent = oldKey ? item[oldKey] : "-";
      document.getElementById("new").textContent = newKey ? item[newKey] : "-";
      document.getElementById("th").textContent = thKey ? item[thKey] : "-";
      document.getElementById("rate").textContent = rate || "-";
      document.getElementById("rate2026").textContent = rate2026 || "-";

      /* RATE COMPARISON */
      const r1 = extractNumber(rate);
      const r2 = extractNumber(rate2026);

      const badge = document.getElementById("rateBadge");
      badge.innerHTML = "";

      if(r1 && r2){
        if(r2 > r1){
          badge.innerHTML = '<span class="badge red">↑ Rate Increased</span>';
        }
        else if(r2 < r1){
          badge.innerHTML = '<span class="badge green">↓ Rate Reduced</span>';
        }
        else{
          badge.innerHTML = '<span class="badge gray">No Change</span>';
        }
      }

      list.style.display = "none";
      document.getElementById("search").value = "";
    };

    list.appendChild(li);
  });
}

/* SHOW LIST */
function showList(){
  document.getElementById("list").style.display = "block";
  renderList(data);
}

const search = document.getElementById("search");

search.addEventListener("focus", showList);
search.addEventListener("click", showList);

/* FILTER */
search.addEventListener("input", function(){

  const val = this.value.toLowerCase();

  if(!val){
    renderList(data);
    return;
  }

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);
});

</script>

</body>
</html>
