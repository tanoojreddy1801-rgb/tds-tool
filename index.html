<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Inter', Arial, sans-serif;
  background: #f7f9fc;
  margin: 0;
  padding: 20px;
}

/* SECTION BUTTONS */
details {
  background: white;
  border-radius: 12px;
  margin-bottom: 15px;
  border: 1px solid #e5e7eb;
  overflow: hidden;
}

summary {
  padding: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  list-style: none;
}

summary:hover {
  background: #eef2ff;
}

/* CONTENT */
.section-content {
  padding: 15px;
}

/* SEARCH */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
  margin-top: 10px;
  border: 1px solid #ddd;
  max-height: 200px;
  overflow-y: auto;
  display: none;
}

li {
  padding: 12px;
  cursor: pointer;
}

li:hover {
  background: #eef2ff;
}

/* RESULT */
.result {
  margin-top: 15px;
  background: #f1f5f9;
  padding: 12px;
  border-radius: 10px;
}

</style>
</head>

<body>

<!-- 🔥 TDS TOOL -->
<details>
  <summary>TDS Compliance Check</summary>

  <div class="section-content">

    <input type="text" id="search" placeholder="Search Nature of Payment...">
    <ul id="list"></ul>

    <div class="result">
      <p><b>Old Act:</b> <span id="old"></span></p>
      <p><b>New Act:</b> <span id="new"></span></p>
      <p><b>Threshold:</b> <span id="th"></span></p>
      <p><b>Rate:</b> <span id="rate"></span></p>
    </div>

  </div>
</details>

<!-- 🔥 COMING SOON -->
<details>
  <summary>ITR Forms Check & Comparison</summary>
  <div class="section-content">
    Coming Soon
  </div>
</details>

<details>
  <summary>Other Tools</summary>
  <div class="section-content">
    Coming Soon
  </div>
</details>

<script>

let data = [];

fetch('data.json')
.then(res => res.json())
.then(json => {
  data = json;
});

/* RENDER */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {

    const keys = Object.keys(item);

    const li = document.createElement("li");
    li.textContent = item[keys[0]];

    li.onclick = () => {

      document.getElementById("old").textContent = item[keys[1]] || "-";
      document.getElementById("new").textContent = item[keys[2]] || "-";
      document.getElementById("th").textContent = item[keys[3]] || "-";
      document.getElementById("rate").textContent = item[keys[4]] || "-";

      document.getElementById("list").style.display = "none";
      document.getElementById("search").value = "";

    };

    list.appendChild(li);
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){

  const val = this.value.toLowerCase();
  const list = document.getElementById("list");

  if(!val){
    list.style.display = "none";
    list.innerHTML = "";
    return;
  }

  list.style.display = "block";

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);
});

</script>

</body>
</html>
