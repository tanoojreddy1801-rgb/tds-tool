<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {font-family: Arial; padding:20px; background:#f5f7ff;}
.container {display:flex; flex-wrap:wrap; gap:15px;}
.card {flex:1 1 250px; background:#1a237e; color:white; padding:20px; cursor:pointer;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);}
.modal-content {background:white; width:95%; max-width:600px; margin:5% auto; padding:20px;}
ul {list-style:none; padding:0;}
li {padding:10px; border-bottom:1px solid #ddd; cursor:pointer;}
.result {margin-top:15px; background:#eef2ff; padding:10px;}
</style>
</head>

<body>

<div class="container">
  <div class="card" onclick="openModal()">TDS Compliance Check</div>
  <div class="card">ITR Forms (Coming Soon)</div>
  <div class="card">Others (Coming Soon)</div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" style="float:right;cursor:pointer;">✖</span>
    <h3>TDS Checker</h3>

    <input type="text" id="search" placeholder="Search..." style="width:100%;padding:10px;">
    <ul id="list"></ul>

    <div class="result">
      <p>Old: <span id="old"></span></p>
      <p>New: <span id="new"></span></p>
      <p>Threshold: <span id="th"></span></p>
      <p>Rate: <span id="rate"></span></p>
    </div>
  </div>
</div>

<script>

let data = [];

fetch('data.json')
.then(res => res.json())
.then(json => {
  data = json;
  console.log("DATA:", data);
});

/* 🔹 RENDER LIST */
function renderList(arr){
  const list = document.getElementById("list");
  list.innerHTML = "";

  arr.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item["Nature of Payment"] || "Unknown";

    li.onclick = () => {
      document.getElementById("old").textContent = item["Old Act"] || "-";
      document.getElementById("new").textContent = item["New Act"] || "-";
      document.getElementById("th").textContent = item["Threshold"] || "-";
      document.getElementById("rate").textContent = item["Rate"] || "-";
    };

    list.appendChild(li);
  });
}

/* 🔹 SEARCH */
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();

  const filtered = data.filter(item =>
    JSON.stringify(item).toLowerCase().includes(val)
  );

  renderList(filtered);
});

/* 🔹 MODAL */
function openModal(){
  document.getElementById("modal").style.display = "block";

  // 👉 SHOW ALL ITEMS ON OPEN
  renderList(data);
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

</script>
  
</body>
</html>
